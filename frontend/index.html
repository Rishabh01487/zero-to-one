<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zero to One - Master C++ & DSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      #particle-bg {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0; pointer-events: none;
      }
      #root { position: relative; z-index: 1; }
    </style>
  </head>
  <body>
    <canvas id="particle-bg"></canvas>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
    (function(){
      var canvas = document.getElementById('particle-bg');
      var ctx = canvas.getContext('2d');
      var particles = [];
      var w, h;
      var COUNT = 90;
      var MAX_DIST = 140;
      var SPEED = 0.35;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      function Particle() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * SPEED * 2;
        this.vy = (Math.random() - 0.5) * SPEED * 2;
      }
      Particle.prototype.update = function() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > w) this.vx *= -1;
        if (this.y < 0 || this.y > h) this.vy *= -1;
        this.x = Math.max(0, Math.min(w, this.x));
        this.y = Math.max(0, Math.min(h, this.y));
      };

      for (var i = 0; i < COUNT; i++) particles.push(new Particle());

      function frame() {
        ctx.clearRect(0, 0, w, h);
        for (var i = 0; i < COUNT; i++) {
          particles[i].update();
          ctx.fillStyle = 'rgba(255,255,255,0.7)';
          ctx.beginPath();
          ctx.arc(particles[i].x, particles[i].y, 2, 0, Math.PI * 2);
          ctx.fill();
        }
        for (var i = 0; i < COUNT; i++) {
          for (var j = i + 1; j < COUNT; j++) {
            var dx = particles[i].x - particles[j].x;
            var dy = particles[i].y - particles[j].y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < MAX_DIST) {
              var alpha = (1 - dist / MAX_DIST) * 0.4;
              ctx.strokeStyle = 'rgba(255,255,255,' + alpha.toFixed(3) + ')';
              ctx.lineWidth = 0.6;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(frame);
      }
      frame();
    })();
    </script>
  </body>
</html>
